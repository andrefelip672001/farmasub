<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo Admin — FarmaSub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1A6B4A;--green-mid:#2E8A62;--white:#FFFFFF;--danger:#C84040;
--ab:#1a1a2e;--asb:#13132a;--anav:#0f0f1e;--acard:#22223a;--atext:#E2E8F0;--amuted:#94A3B8;--aborder:rgba(255,255,255,.07);--r:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--ab);color:var(--atext);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.top-nav{height:64px;background:var(--anav);border-bottom:1px solid var(--aborder);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.nav-left{display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--white);}
.logo-text span{color:#5EE8A0;}
.nav-tag{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amuted);background:rgba(255,255,255,.06);border:1px solid var(--aborder);border-radius:20px;padding:4px 10px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-user{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--amuted);}
.nav-avatar{width:30px;height:30px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;color:white;}
.btn-logout{background:none;border:1px solid var(--aborder);border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:500;color:var(--amuted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--asb);border-right:1px solid var(--aborder);flex-shrink:0;overflow-y:auto;padding:16px 10px;display:flex;flex-direction:column;gap:2px;}
.sb-link{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;text-decoration:none;font-size:.82rem;font-weight:500;color:var(--amuted);transition:all .15s;}
.sb-link:hover{background:rgba(255,255,255,.06);color:var(--atext);}
.sb-link.active{background:var(--green);color:white;}
.sb-link svg{width:17px;height:17px;flex-shrink:0;stroke-width:1.8;}
.sb-divider{border:none;border-top:1px solid var(--aborder);margin:8px 0;}
.main{flex:1;overflow-y:auto;padding:28px;}
.page-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:20px;}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--amuted);}
.search-input{width:100%;padding:9px 12px 9px 34px;background:var(--acard);border:1px solid var(--aborder);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.82rem;color:var(--atext);outline:none;}
.search-input:focus{border-color:var(--green);}
.search-input::placeholder{color:var(--amuted);}
.btn-nuevo{padding:9px 18px;background:var(--green);border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:white;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;}
.btn-nuevo:hover{background:var(--green-mid);}

/* TABLE */
.table-wrap{background:var(--acard);border-radius:var(--r);border:1px solid var(--aborder);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amuted);border-bottom:1px solid var(--aborder);background:rgba(0,0,0,.15);}
td{padding:11px 16px;font-size:.82rem;border-bottom:1px solid var(--aborder);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(26,107,74,.04);}
.badge-activo{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;background:rgba(220,252,231,.1);color:#5EE8A0;}
.badge-inactivo{display:inline-block;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.06);color:var(--amuted);}
.badge-receta{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:600;background:rgba(253,243,199,.12);color:#FCD34D;}
.btn-edit{padding:5px 11px;background:none;border:1px solid var(--aborder);border-radius:7px;font-size:.72rem;font-weight:500;color:var(--atext);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-right:5px;}
.btn-edit:hover{border-color:var(--green);color:#5EE8A0;}
.btn-toggle{padding:5px 11px;background:none;border:1px solid var(--aborder);border-radius:7px;font-size:.72rem;font-weight:500;color:var(--amuted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-toggle:hover{border-color:rgba(200,64,64,.4);color:#FCA5A5;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--acard);border:1px solid var(--aborder);border-radius:20px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:32px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;}
.btn-close{background:none;border:none;cursor:pointer;color:var(--amuted);padding:4px;border-radius:6px;transition:color .2s;}
.btn-close:hover{color:var(--atext);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fg-full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.75rem;font-weight:600;color:var(--amuted);}
.field input,.field select,.field textarea{background:rgba(255,255,255,.06);border:1px solid var(--aborder);border-radius:9px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--atext);outline:none;transition:border .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.2);}
.field textarea{resize:vertical;min-height:72px;}
.field select option{background:var(--acard);}
.check-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.04);border-radius:9px;cursor:pointer;}
.check-row input[type=checkbox]{accent-color:var(--green);width:16px;height:16px;cursor:pointer;}
.check-row label{font-size:.85rem;cursor:pointer;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;padding-top:16px;border-top:1px solid var(--aborder);}
.btn-cancel{padding:9px 20px;background:none;border:1px solid var(--aborder);border-radius:9px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;color:var(--amuted);cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:rgba(255,255,255,.2);color:var(--atext);}
.btn-guardar{padding:9px 20px;background:var(--green);border:none;border-radius:9px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;color:white;cursor:pointer;transition:all .2s;}
.btn-guardar:hover{background:var(--green-mid);}
</style>
</head>
<body>
<div class="app">

<nav class="top-nav">
  <div class="nav-left">
    <a href="/admin/dashboard.html" class="nav-logo">
      <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      <span class="logo-text">Farma<span>Sub</span></span>
    </a>
    <span class="nav-tag">Panel Admin</span>
  </div>
  <div class="nav-right">
    <div class="nav-user"><div class="nav-avatar" id="nav-avatar">A</div><span id="nav-nombre">Admin</span></div>
    <button onclick="logout()" class="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/admin/dashboard.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Inicio</a>
    <a href="/admin/suscriptores.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Suscriptores</a>
    <a href="/admin/pedidos.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Pedidos</a>
    <a href="/admin/catalogo.html" class="sb-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Catálogo</a>
    <hr class="sb-divider"/>
    <a href="/admin/pagos.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pagos</a>
  </aside>

  <main class="main">
    <h1 class="page-title">Catálogo de productos</h1>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Buscar producto..." oninput="filterTable()" id="search"/>
      </div>
      <button class="btn-nuevo" onclick="openModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Agregar producto
      </button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Principio activo</th><th>Categoría</th><th>Precio farmacia</th><th>Precio costo</th><th>Receta</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="8" style="text-align:center;padding:24px;color:var(--amuted)">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
</div>

<!-- MODAL PRODUCTO -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Agregar producto</h2>
      <button class="btn-close" onclick="closeModal()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <input type="hidden" id="f-id"/>
    <div class="form-grid">
      <div class="field fg-full"><label>Nombre del producto *</label><input id="f-nombre" type="text" placeholder="Ej. Metformina 500mg"/></div>
      <div class="field fg-full"><label>Principio activo *</label><input id="f-activo" type="text" placeholder="Ej. Clorhidrato de Metformina"/></div>
      <div class="field"><label>Categoría</label>
        <select id="f-categoria"><option value="">Sin categoría</option></select>
      </div>
      <div class="field"><label>Unidades por caja</label><input id="f-unidades" type="number" min="1" placeholder="30"/></div>
      <div class="field"><label>Precio farmacia ($) *</label><input id="f-pfarmacia" type="number" step="0.01" min="0" placeholder="0.00"/></div>
      <div class="field"><label>Precio costo ($) *</label><input id="f-pcosto" type="number" step="0.01" min="0" placeholder="0.00"/></div>
      <div class="field"><label>Stock actual</label><input id="f-stock" type="number" min="0" placeholder="0"/></div>
      <div class="field" style="align-self:end">
        <div class="check-row"><input type="checkbox" id="f-receta"/><label for="f-receta">Requiere receta médica</label></div>
      </div>
      <div class="field fg-full"><label>Indicaciones</label><textarea id="f-indicaciones" placeholder="Describe las indicaciones del medicamento..."></textarea></div>
      <div class="field fg-full"><label>Dosis recomendada</label><textarea id="f-dosis" placeholder="Ej. 1 comprimido cada 12 horas con las comidas..."></textarea></div>
      <div class="field fg-full"><label>Contraindicaciones</label><textarea id="f-contraindicaciones" placeholder="Contraindico en casos de..."></textarea></div>
      <div class="field fg-full"><label>Efectos secundarios</label><textarea id="f-efectos" placeholder="Puede producir náuseas, mareos..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarProducto()">Guardar producto</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');
let _productos=[],_categorias=[];

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(!session){window.location.href='/portal/login.html';return;}
  const user=session.user;
  let rol=user.user_metadata?.rol||user.app_metadata?.rol||null;
  if(!rol){const {data:p}=await _db.from('perfiles').select('rol').eq('id',user.id).single();rol=p?.rol||'suscriptor';}
  if(rol!=='admin'){window.location.href='/portal/login.html';return;}
  document.getElementById('nav-nombre').textContent=user.email;
  document.getElementById('nav-avatar').textContent=user.email[0].toUpperCase();
  const {data:cats}=await _db.from('categorias').select('*').order('nombre');
  _categorias=cats||[];
  const sel=document.getElementById('f-categoria');
  _categorias.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nombre;sel.appendChild(o);});
  await loadData();
})();

async function loadData(){
  const {data}=await _db.from('productos').select('*,categorias(nombre)').order('nombre');
  _productos=data||[];
  renderTable();
}

function filterTable(){renderTable();}

function renderTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const rows=_productos.filter(p=>!q||p.nombre?.toLowerCase().includes(q)||(p.principio_activo||'').toLowerCase().includes(q));
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--amuted)">Sin resultados</td></tr>';return;}
  tbody.innerHTML=rows.map(p=>`<tr>
    <td style="font-weight:500">${p.nombre}</td>
    <td style="color:var(--amuted);font-size:.78rem">${p.principio_activo||'—'}</td>
    <td style="color:var(--amuted);font-size:.78rem">${p.categorias?.nombre||'—'}</td>
    <td>$${(p.precio_farmacia||0).toFixed(2)}</td>
    <td style="color:#5EE8A0;font-weight:600">$${(p.precio_costo||0).toFixed(2)}</td>
    <td>${p.requiere_receta?'<span class="badge-receta">Sí</span>':'—'}</td>
    <td><span class="${p.activo?'badge-activo':'badge-inactivo'}">${p.activo?'Activo':'Inactivo'}</span></td>
    <td>
      <button class="btn-edit" onclick="editProducto(${p.id})">Editar</button>
      <button class="btn-toggle" onclick="toggleActivo(${p.id},${!p.activo})">${p.activo?'Desactivar':'Activar'}</button>
    </td>
  </tr>`).join('');
}

function openModal(id){
  document.getElementById('modal-overlay').classList.add('open');
  if(!id){
    document.getElementById('modal-title').textContent='Agregar producto';
    ['id','nombre','activo','categoria','unidades','pfarmacia','pcosto','stock','indicaciones','dosis','contraindicaciones','efectos'].forEach(k=>document.getElementById('f-'+k).value='');
    document.getElementById('f-receta').checked=false;
  }
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function editProducto(id){
  const p=_productos.find(x=>x.id===id);if(!p)return;
  document.getElementById('modal-title').textContent='Editar producto';
  document.getElementById('f-id').value=p.id;
  document.getElementById('f-nombre').value=p.nombre||'';
  document.getElementById('f-activo').value=p.principio_activo||'';
  document.getElementById('f-categoria').value=p.categoria_id||'';
  document.getElementById('f-unidades').value=p.unidades_caja||'';
  document.getElementById('f-pfarmacia').value=p.precio_farmacia||'';
  document.getElementById('f-pcosto').value=p.precio_costo||'';
  document.getElementById('f-stock').value=p.stock||'';
  document.getElementById('f-receta').checked=!!p.requiere_receta;
  document.getElementById('f-indicaciones').value=p.indicaciones||'';
  document.getElementById('f-dosis').value=p.dosis||'';
  document.getElementById('f-contraindicaciones').value=p.contraindicaciones||'';
  document.getElementById('f-efectos').value=p.efectos_secundarios||'';
  document.getElementById('modal-overlay').classList.add('open');
}

async function guardarProducto(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const principio=document.getElementById('f-activo').value.trim();
  if(!nombre||!principio){alert('Nombre y principio activo son obligatorios.');return;}
  const payload={
    nombre,principio_activo:principio,
    categoria_id:document.getElementById('f-categoria').value||null,
    unidades_caja:parseInt(document.getElementById('f-unidades').value)||30,
    precio_farmacia:parseFloat(document.getElementById('f-pfarmacia').value)||0,
    precio_costo:parseFloat(document.getElementById('f-pcosto').value)||0,
    stock:parseInt(document.getElementById('f-stock').value)||0,
    requiere_receta:document.getElementById('f-receta').checked,
    indicaciones:document.getElementById('f-indicaciones').value.trim()||null,
    dosis:document.getElementById('f-dosis').value.trim()||null,
    contraindicaciones:document.getElementById('f-contraindicaciones').value.trim()||null,
    efectos_secundarios:document.getElementById('f-efectos').value.trim()||null,
    activo:true
  };
  const id=document.getElementById('f-id').value;
  if(id){await _db.from('productos').update(payload).eq('id',id);}
  else{await _db.from('productos').insert(payload);}
  closeModal();
  await loadData();
}

async function toggleActivo(id,activo){
  await _db.from('productos').update({activo}).eq('id',id);
  await loadData();
}

function logout(){_db.auth.signOut().then(()=>window.location.href='/portal/login.html');}
</script>
</body>
</html>
