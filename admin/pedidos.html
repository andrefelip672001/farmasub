<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pedidos — FarmaSub Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1A6B4A;--green-mid:#2E8A62;--white:#FFFFFF;--danger:#C84040;
--ab:#1a1a2e;--asb:#13132a;--anav:#0f0f1e;--acard:#22223a;--atext:#E2E8F0;--amuted:#94A3B8;--aborder:rgba(255,255,255,.07);--r:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--ab);color:var(--atext);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.top-nav{height:64px;background:var(--anav);border-bottom:1px solid var(--aborder);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.nav-left{display:flex;align-items:center;gap:16px;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--white);}
.logo-text span{color:#5EE8A0;}
.nav-tag{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amuted);background:rgba(255,255,255,.06);border:1px solid var(--aborder);border-radius:20px;padding:4px 10px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-user{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--amuted);}
.nav-avatar{width:30px;height:30px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;color:white;}
.btn-logout{background:none;border:1px solid var(--aborder);border-radius:8px;padding:5px 12px;font-size:.78rem;font-weight:500;color:var(--amuted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:220px;background:var(--asb);border-right:1px solid var(--aborder);flex-shrink:0;overflow-y:auto;padding:16px 10px;display:flex;flex-direction:column;gap:2px;}
.sb-link{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;text-decoration:none;font-size:.82rem;font-weight:500;color:var(--amuted);transition:all .15s;}
.sb-link:hover{background:rgba(255,255,255,.06);color:var(--atext);}
.sb-link.active{background:var(--green);color:white;}
.sb-link svg{width:17px;height:17px;flex-shrink:0;stroke-width:1.8;}
.sb-divider{border:none;border-top:1px solid var(--aborder);margin:8px 0;}
.main{flex:1;overflow-y:auto;padding:28px;}
.page-title{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:20px;}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--amuted);}
.search-input{width:100%;padding:9px 12px 9px 34px;background:var(--acard);border:1px solid var(--aborder);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.82rem;color:var(--atext);outline:none;transition:border .2s;}
.search-input:focus{border-color:var(--green);}
.search-input::placeholder{color:var(--amuted);}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:7px 12px;background:rgba(255,255,255,.05);border:1px solid var(--aborder);border-radius:20px;font-size:.75rem;font-weight:500;color:var(--amuted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.filter-btn:hover{border-color:rgba(26,107,74,.4);color:var(--atext);}
.filter-btn.active{background:var(--green);border-color:var(--green);color:white;}

/* TABLE */
.table-wrap{background:var(--acard);border-radius:var(--r);border:1px solid var(--aborder);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amuted);border-bottom:1px solid var(--aborder);background:rgba(0,0,0,.15);}
td{padding:11px 16px;font-size:.82rem;border-bottom:1px solid var(--aborder);vertical-align:middle;}
.detail-row td{padding:0;background:rgba(0,0,0,.15);}
.detail-inner{padding:14px 16px;display:none;}
.detail-inner.open{display:block;}
tr.clickable{cursor:pointer;}
tr.clickable:hover td{background:rgba(26,107,74,.06);}

/* BADGES */
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:600;}
.badge-pendiente{background:rgba(254,249,195,.12);color:#FCD34D;}
.badge-en-proceso{background:rgba(147,197,253,.12);color:#93C5FD;}
.badge-despachado{background:rgba(216,180,254,.12);color:#D8B4FE;}
.badge-entregado{background:rgba(220,252,231,.1);color:#5EE8A0;}
.badge-cancelado{background:rgba(254,226,226,.1);color:#FCA5A5;}

/* STATUS BUTTONS */
.status-select{background:rgba(255,255,255,.06);border:1px solid var(--aborder);border-radius:8px;padding:6px 10px;font-family:'Inter',sans-serif;font-size:.75rem;color:var(--atext);cursor:pointer;outline:none;}
.status-select:focus{border-color:var(--green);}

/* DETAIL */
.detail-items{display:flex;flex-direction:column;gap:4px;}
.di-row{display:flex;justify-content:space-between;font-size:.78rem;padding:5px 10px;background:rgba(255,255,255,.04);border-radius:7px;}
.di-name{color:var(--atext);}
.di-meta{color:var(--amuted);}
</style>
</head>
<body>
<div class="app">

<nav class="top-nav">
  <div class="nav-left">
    <a href="/admin/dashboard.html" class="nav-logo">
      <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
      <span class="logo-text">Farma<span>Sub</span></span>
    </a>
    <span class="nav-tag">Panel Admin</span>
  </div>
  <div class="nav-right">
    <div class="nav-user"><div class="nav-avatar" id="nav-avatar">A</div><span id="nav-nombre">Admin</span></div>
    <button onclick="logout()" class="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/admin/dashboard.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Inicio</a>
    <a href="/admin/suscriptores.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Suscriptores</a>
    <a href="/admin/pedidos.html" class="sb-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Pedidos</a>
    <a href="/admin/catalogo.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>Catálogo</a>
    <hr class="sb-divider"/>
    <a href="/admin/pagos.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Pagos</a>
  </aside>

  <main class="main">
    <h1 class="page-title">Pedidos</h1>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Buscar número o suscriptor..." oninput="filterTable()" id="search"/>
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
        <button class="filter-btn" onclick="setFilter('pendiente',this)">Pendiente</button>
        <button class="filter-btn" onclick="setFilter('en-proceso',this)">En proceso</button>
        <button class="filter-btn" onclick="setFilter('despachado',this)">Despachado</button>
        <button class="filter-btn" onclick="setFilter('entregado',this)">Entregado</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th></th><th>Número</th><th>Suscriptor</th><th>Fecha</th><th>Total</th><th>Estado</th><th>Cambiar estado</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="7" style="text-align:center;padding:24px;color:var(--amuted)">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');
let _todos=[],_filtro='todos';

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(!session){window.location.href='/portal/login.html';return;}
  const user=session.user;
  let rol=user.user_metadata?.rol||user.app_metadata?.rol||null;
  if(!rol){const {data:p}=await _db.from('perfiles').select('rol').eq('id',user.id).single();rol=p?.rol||'suscriptor';}
  if(rol!=='admin'){window.location.href='/portal/login.html';return;}
  document.getElementById('nav-nombre').textContent=user.email;
  document.getElementById('nav-avatar').textContent=user.email[0].toUpperCase();
  await loadData();
})();

async function loadData(){
  const {data}=await _db.from('pedidos').select('*,suscriptores(nombre,cedula)').order('fecha',{ascending:false});
  _todos=data||[];
  renderTable();
}

function setFilter(f,btn){_filtro=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function filterTable(){renderTable();}

const ESTADOS=['pendiente','en-proceso','despachado','entregado','cancelado'];
function badgeCls(e){return{'pendiente':'badge-pendiente','en-proceso':'badge-en-proceso','despachado':'badge-despachado','entregado':'badge-entregado','cancelado':'badge-cancelado'}[e]||'badge-pendiente';}

function renderTable(){
  const q=document.getElementById('search').value.toLowerCase();
  const rows=_todos.filter(p=>{
    if(_filtro!=='todos'&&p.estado!==_filtro)return false;
    return !q||(p.numero||'').toLowerCase().includes(q)||(p.suscriptores?.nombre||'').toLowerCase().includes(q);
  });
  const tbody=document.getElementById('tbody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--amuted)">Sin resultados</td></tr>';return;}
  tbody.innerHTML=rows.map((p,i)=>{
    const cls=badgeCls(p.estado);
    return`<tr class="clickable" onclick="toggleDetail(${i})">
      <td style="color:var(--amuted);width:32px">
        <svg id="chev-${i}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
      </td>
      <td style="font-weight:600;color:#5EE8A0">${p.numero||'#'+p.id}</td>
      <td>${p.suscriptores?.nombre||'—'}</td>
      <td style="color:var(--amuted)">${new Date(p.fecha).toLocaleDateString('es-EC')}</td>
      <td>$${(p.total||0).toFixed(2)}</td>
      <td><span class="badge ${cls}">${p.estado}</span></td>
      <td onclick="event.stopPropagation()">
        <select class="status-select" onchange="cambiarEstado('${p.id}',this.value)">
          ${ESTADOS.map(e=>`<option value="${e}"${p.estado===e?' selected':''}>${e}</option>`).join('')}
        </select>
      </td>
    </tr>
    <tr class="detail-row">
      <td colspan="7"><div class="detail-inner" id="detail-${i}" data-loaded="0" data-id="${p.id}"></div></td>
    </tr>`;
  }).join('');
}

async function toggleDetail(i){
  const det=document.getElementById('detail-'+i);
  const chev=document.getElementById('chev-'+i);
  if(det.classList.contains('open')){det.classList.remove('open');chev.style.transform='';return;}
  det.classList.add('open');chev.style.transform='rotate(180deg)';
  if(det.dataset.loaded==='1')return;
  det.dataset.loaded='1';
  const pedidoId=det.dataset.id;
  const {data:items}=await _db.from('pedido_items').select('cantidad,precio_unitario,productos(nombre),miembros(nombre)').eq('pedido_id',pedidoId);
  if(!items||!items.length){det.innerHTML='<p style="font-size:.78rem;color:var(--amuted)">Sin productos registrados.</p>';return;}
  det.innerHTML=`<p style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amuted);margin-bottom:8px">Productos del pedido</p>
    <div class="detail-items">${items.map(i=>`<div class="di-row"><span class="di-name">${i.productos?.nombre||'Producto'}</span><div style="display:flex;gap:16px"><span class="di-meta">Para: ${i.miembros?.nombre||'Titular'}</span><span class="di-meta">×${i.cantidad}</span><span style="font-weight:600">$${((i.precio_unitario||0)*i.cantidad).toFixed(2)}</span></div></div>`).join('')}</div>`;
}

async function cambiarEstado(id,estado){
  await _db.from('pedidos').update({estado}).eq('id',id);
  await loadData();
}

function logout(){_db.auth.signOut().then(()=>window.location.href='/portal/login.html');}
</script>
</body>
</html>
