<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso Admin — FarmaSub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1A6B4A;--green-light:#EAF4EE;--green-mid:#2E8A62;
  --ink:#12201A;--ink-60:#5A7065;--ink-30:#B0C4BB;
  --white:#FFFFFF;--danger:#C84040;--danger-bg:#FDF2F2;--r:14px;
  --shadow-lg:0 8px 40px rgba(26,107,74,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0E3D29 0%,#1A6B4A 60%,#2E8A62 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;overflow:hidden;
}
body::before{content:'';position:absolute;top:-30%;right:-15%;width:600px;height:600px;background:radial-gradient(circle,rgba(200,144,58,.15) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:absolute;bottom:-20%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(94,232,160,.08) 0%,transparent 70%);pointer-events:none;}

.card{background:var(--white);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);position:relative;z-index:1;}

.logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:16px;}
.logo-mark{width:40px;height:40px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-mark svg{width:22px;height:22px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);}
.logo-text span{color:var(--green);}

.admin-tag{display:block;text-align:center;margin-bottom:28px;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:white;background:var(--green);border-radius:20px;padding:5px 16px;width:fit-content;margin-left:auto;margin-right:auto;}

.card-title{font-family:'DM Serif Display',serif;font-size:1.75rem;color:var(--ink);text-align:center;margin-bottom:6px;}
.card-sub{text-align:center;font-size:.88rem;color:var(--ink-60);margin-bottom:32px;}

.error-box{background:var(--danger-bg);border:1px solid rgba(200,64,64,.25);border-radius:10px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.error-box p{font-size:.875rem;color:var(--danger);font-weight:500;line-height:1.4;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:.85rem;font-weight:600;color:var(--ink);margin-bottom:7px;}
.field input{width:100%;padding:12px 16px;border:1.5px solid var(--ink-30);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.95rem;color:var(--ink);background:var(--white);transition:border-color .2s,box-shadow .2s;outline:none;}
.field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,107,74,.1);}
.field input.err{border-color:var(--danger);box-shadow:0 0 0 3px rgba(200,64,64,.1);}
.field input::placeholder{color:var(--ink-30);}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:48px;}
.pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-60);padding:4px;border-radius:6px;transition:color .2s;}
.pass-toggle:hover{color:var(--green);}

.btn-login{width:100%;padding:14px;background:var(--green);color:white;border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.btn-login:hover:not(:disabled){background:var(--green-mid);transform:translateY(-1px);box-shadow:0 4px 20px rgba(26,107,74,.3);}
.btn-login:disabled{opacity:.65;cursor:not-allowed;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-login.loading .spinner{display:block;}
.btn-login.loading .btn-lbl{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

.divider{border:none;border-top:1px solid #E8F0EC;margin:24px 0 20px;}
.back-link{display:block;text-align:center;font-size:.875rem;color:var(--ink-60);}
.back-link a{color:var(--green);font-weight:600;text-decoration:none;}
.back-link a:hover{text-decoration:underline;}

@media(max-width:480px){.card{padding:36px 24px;}.card-title{font-size:1.5rem;}}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="logo-text">Farma<span>Sub</span></span>
  </a>
  <span class="admin-tag">Panel Administrativo</span>

  <h1 class="card-title">Acceso restringido</h1>
  <p class="card-sub">Acceso exclusivo para administradores</p>

  <div id="error-box" class="error-box" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C84040" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    <p id="error-msg"></p>
  </div>

  <form id="form" onsubmit="handleLogin(event)" novalidate>
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="admin@farmasub.ec" autocomplete="email" required/>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        <button type="button" class="pass-toggle" onclick="togglePass()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" id="btn-login" class="btn-login">
      <span class="btn-lbl">Ingresar</span>
      <span class="spinner"></span>
    </button>
  </form>

  <hr class="divider"/>
  <p class="back-link">¿Eres suscriptor? <a href="/portal/login.html">Accede aquí</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(session){await checkAndRedirect(session.user);}
})();

async function handleLogin(e){
  e.preventDefault();
  clearErr();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!email||!pass){showErr('Completa todos los campos.');return;}
  setLoading(true);
  const {data,error}=await _db.auth.signInWithPassword({email,password:pass});
  if(error){setLoading(false);showErr('Credenciales inválidas.');return;}
  await checkAndRedirect(data.user);
}

async function checkAndRedirect(user){
  let rol=user.user_metadata?.rol||user.app_metadata?.rol||null;
  if(!rol){
    const {data:p}=await _db.from('perfiles').select('rol').eq('id',user.id).single();
    rol=p?.rol||'suscriptor';
  }
  if(rol==='admin'){window.location.href='/admin/dashboard.html';}
  else{await _db.auth.signOut();showErr('No tienes permisos de administrador.');setLoading(false);}
}

function togglePass(){
  const i=document.getElementById('password');
  i.type=i.type==='password'?'text':'password';
}
function setLoading(on){const b=document.getElementById('btn-login');b.disabled=on;b.classList.toggle('loading',on);}
function showErr(m){document.getElementById('error-msg').textContent=m;document.getElementById('error-box').style.display='flex';}
function clearErr(){document.getElementById('error-box').style.display='none';}
</script>
</body>
</html>
