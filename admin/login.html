<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acceso Admin — FarmaSub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1A6B4A;--green-light:#EAF4EE;--ink:#12201A;--white:#FFFFFF;--danger:#C84040;--admin-bg:#12201A;--admin-card:#1c2e26;--admin-border:rgba(255,255,255,.1);--r:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--admin-bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(26,107,74,.12) 0%,transparent 70%);pointer-events:none;}
body::after{content:'';position:absolute;bottom:-20%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(200,144,58,.06) 0%,transparent 70%);pointer-events:none;}

.card{background:var(--admin-card);border:1px solid var(--admin-border);border-radius:20px;padding:44px 40px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.4);}

.logo{display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;margin-bottom:8px;}
.logo-mark{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--white);}
.logo-text span{color:#5EE8A0;}

.admin-tag{text-align:center;margin-bottom:28px;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 14px;display:inline-block;width:100%;}

.card-title{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--white);text-align:center;margin-bottom:6px;}
.card-sub{text-align:center;font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:28px;}

.error-box{background:rgba(200,64,64,.15);border:1px solid rgba(200,64,64,.3);border-radius:10px;padding:11px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.error-box p{font-size:.82rem;color:#FCA5A5;font-weight:500;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:.8rem;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px;}
.field input{width:100%;padding:11px 14px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.9rem;color:var(--white);outline:none;transition:border .2s;}
.field input:focus{border-color:var(--green);}
.field input::placeholder{color:rgba(255,255,255,.2);}
.field input.err{border-color:rgba(200,64,64,.6);}
.pass-wrap{position:relative;}
.pass-wrap input{padding-right:44px;}
.pass-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);padding:4px;transition:color .2s;}
.pass-toggle:hover{color:rgba(255,255,255,.6);}

.btn-login{width:100%;padding:13px;background:var(--green);border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;color:white;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.btn-login:hover:not(:disabled){background:#2E8A62;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.spinner{width:17px;height:17px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-login.loading .spinner{display:block;}
.btn-login.loading .btn-lbl{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

.back-link{display:block;text-align:center;margin-top:20px;font-size:.82rem;color:rgba(255,255,255,.35);text-decoration:none;}
.back-link:hover{color:rgba(255,255,255,.6);}
.back-link span{color:var(--green);}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="logo-text">Farma<span>Sub</span></span>
  </a>
  <span class="admin-tag">Panel Administrativo</span>

  <h1 class="card-title">Acceso restringido</h1>
  <p class="card-sub">Solo personal autorizado</p>

  <div id="error-box" class="error-box" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FCA5A5" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    <p id="error-msg"></p>
  </div>

  <form id="form" onsubmit="handleLogin(event)" novalidate>
    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="admin@farmasub.ec" autocomplete="email" required/>
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        <button type="button" class="pass-toggle" onclick="togglePass()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" id="btn-login" class="btn-login">
      <span class="btn-lbl">Ingresar</span>
      <span class="spinner"></span>
    </button>
  </form>

  <a href="/portal/login.html" class="back-link">¿Eres suscriptor? <span>Accede aquí</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(session){await checkAndRedirect(session.user);}
})();

async function handleLogin(e){
  e.preventDefault();
  clearErr();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  if(!email||!pass){showErr('Completa todos los campos.');return;}
  setLoading(true);
  const {data,error}=await _db.auth.signInWithPassword({email,password:pass});
  if(error){setLoading(false);showErr('Credenciales inválidas.');return;}
  await checkAndRedirect(data.user);
}

async function checkAndRedirect(user){
  let rol=user.user_metadata?.rol||user.app_metadata?.rol||null;
  if(!rol){
    const {data:p}=await _db.from('perfiles').select('rol').eq('id',user.id).single();
    rol=p?.rol||'suscriptor';
  }
  if(rol==='admin'){window.location.href='/admin/dashboard.html';}
  else{await _db.auth.signOut();showErr('No tienes permisos de administrador.');setLoading(false);}
}

function togglePass(){
  const i=document.getElementById('password');
  i.type=i.type==='password'?'text':'password';
}
function setLoading(on){const b=document.getElementById('btn-login');b.disabled=on;b.classList.toggle('loading',on);}
function showErr(m){document.getElementById('error-msg').textContent=m;document.getElementById('error-box').style.display='flex';}
function clearErr(){document.getElementById('error-box').style.display='none';}
</script>
</body>
</html>
