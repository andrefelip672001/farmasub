<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Catálogo — FarmaSub Ecuador</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1A6B4A;--green-light:#EAF4EE;--green-mid:#2E8A62;--gold:#C8903A;--ink:#12201A;--ink-60:#5A7065;--ink-30:#B0C4BB;--white:#FFFFFF;--bg:#F7FAF8;--danger:#C84040;--r:12px;--shadow:0 2px 12px rgba(26,107,74,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.top-nav{height:64px;background:var(--white);border-bottom:1px solid rgba(26,107,74,.1);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 1px 8px rgba(26,107,74,.06);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);}
.logo-text span{color:var(--green);}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-user{display:flex;align-items:center;gap:8px;font-size:.875rem;font-weight:500;color:var(--ink-60);}
.nav-avatar{width:32px;height:32px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:700;font-size:.82rem;}
.btn-logout{background:none;border:1.5px solid var(--ink-30);border-radius:8px;padding:6px 14px;font-size:.82rem;font-weight:500;color:var(--ink-60);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:240px;background:var(--green-light);border-right:1px solid rgba(26,107,74,.12);flex-shrink:0;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:2px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;font-size:.875rem;font-weight:500;color:var(--ink-60);transition:all .15s;}
.sb-link:hover{background:rgba(26,107,74,.1);color:var(--green);}
.sb-link.active{background:var(--green);color:var(--white);}
.sb-link svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.8;}
.sb-badge{margin-left:auto;background:var(--gold);color:white;font-size:.7rem;font-weight:700;border-radius:99px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.sb-link.active .sb-badge{background:rgba(255,255,255,.3);}
.sb-divider{border:none;border-top:1px solid rgba(26,107,74,.15);margin:8px 0;}
.main{flex:1;overflow-y:auto;padding:28px;}

/* TOOLBAR */
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:220px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-30);}
.search-input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--ink-30);border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.875rem;background:var(--white);color:var(--ink);outline:none;transition:border .2s;}
.search-input:focus{border-color:var(--green);}
.cats-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.cat-btn{padding:8px 14px;border:1.5px solid var(--ink-30);border-radius:20px;background:var(--white);font-size:.8rem;font-weight:500;color:var(--ink-60);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.cat-btn:hover{border-color:var(--green);color:var(--green);}
.cat-btn.active{background:var(--green);border-color:var(--green);color:white;}

/* GRID */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.prod-card{background:var(--white);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);border:1px solid rgba(26,107,74,.06);display:flex;flex-direction:column;gap:8px;transition:box-shadow .2s;}
.prod-card:hover{box-shadow:0 4px 24px rgba(26,107,74,.14);}
.prod-nombre{font-weight:600;font-size:.95rem;color:var(--ink);}
.prod-activo{font-size:.8rem;color:var(--ink-60);}
.prod-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge-receta{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#FEF3C7;border-radius:20px;font-size:.7rem;font-weight:600;color:#92400E;}
.badge-cat{padding:3px 8px;background:var(--green-light);border-radius:20px;font-size:.7rem;font-weight:500;color:var(--green);}
.prod-precios{margin-top:4px;}
.precio-normal{font-size:.82rem;color:var(--danger);text-decoration:line-through;}
.precio-sub{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--green);}
.prod-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px;}
.btn-ver{flex:1;padding:9px;border:1.5px solid var(--green);border-radius:var(--r);background:none;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:var(--green);cursor:pointer;transition:all .2s;}
.btn-ver:hover{background:var(--green-light);}
.btn-add{flex:2;padding:9px;background:var(--green);border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:white;cursor:pointer;transition:all .2s;}
.btn-add:hover{background:var(--green-mid);}
.btn-add.added{background:#166534;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--ink-60);}
.empty svg{width:48px;height:48px;color:var(--ink-30);margin-bottom:12px;}
.empty p{font-size:.95rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(18,32,26,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:32px;}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--ink);}
.modal-close{background:none;border:none;cursor:pointer;color:var(--ink-60);padding:4px;border-radius:6px;transition:color .2s;}
.modal-close:hover{color:var(--ink);}
.modal-activo{font-size:.875rem;color:var(--ink-60);margin-bottom:16px;}
.modal-section{margin-bottom:16px;}
.modal-section-title{font-size:.72rem;font-weight:700;color:var(--ink-60);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.modal-section p{font-size:.875rem;color:var(--ink-60);line-height:1.5;}
.modal-precios{display:flex;align-items:center;gap:16px;padding:16px;background:var(--green-light);border-radius:var(--r);margin-bottom:20px;}
.modal-precio-sub{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--green);}
.modal-precio-normal{font-size:.875rem;color:var(--danger);text-decoration:line-through;}
.modal-ahorro{font-size:.8rem;color:var(--green-mid);font-weight:600;}
.btn-add-modal{width:100%;padding:14px;background:var(--green);border:none;border-radius:var(--r);font-family:'Inter',sans-serif;font-size:.95rem;font-weight:600;color:white;cursor:pointer;transition:all .2s;}
.btn-add-modal:hover{background:var(--green-mid);}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--ink);color:white;padding:12px 20px;border-radius:12px;font-size:.875rem;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:300;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>
<div class="app">

<nav class="top-nav">
  <a href="/portal/dashboard.html" class="nav-logo">
    <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="logo-text">Farma<span>Sub</span></span>
  </a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-nombre">Cargando...</span>
    </div>
    <button onclick="logout()" class="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/portal/dashboard.html" class="sb-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3l9 9"/><path d="M5 10v10h5v-5h4v5h5V10"/></svg>Inicio
    </a>
    <a href="/portal/catalogo.html" class="sb-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Catálogo
    </a>
    <a href="/portal/pedido.html" class="sb-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Mi pedido
      <span class="sb-badge" id="cart-badge" style="display:none">0</span>
    </a>
    <a href="/portal/mis-pedidos.html" class="sb-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mis pedidos
    </a>
    <hr class="sb-divider"/>
    <a href="/portal/cuenta.html" class="sb-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi cuenta
    </a>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" type="text" placeholder="Buscar medicamento..." oninput="filterProducts()" id="search"/>
      </div>
      <div class="cats-wrap" id="cats-wrap">
        <button class="cat-btn active" onclick="selectCat(null,this)">Todos</button>
      </div>
    </div>
    <div class="products-grid" id="products-grid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--ink-60)">Cargando catálogo...</div>
    </div>
  </main>
</div>
</div>

<!-- MODAL VADEMECUM -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="m-nombre"></h2>
      <button class="modal-close" onclick="closeModalBtn()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <p class="modal-activo" id="m-activo"></p>
    <div class="modal-precios">
      <div>
        <div class="modal-precio-sub" id="m-precio-sub"></div>
        <div class="modal-precio-normal" id="m-precio-normal"></div>
      </div>
      <div style="margin-left:auto"><span class="modal-ahorro" id="m-ahorro"></span></div>
    </div>
    <div class="modal-section"><p class="modal-section-title">Indicaciones</p><p id="m-indicaciones"></p></div>
    <div class="modal-section"><p class="modal-section-title">Dosis recomendada</p><p id="m-dosis"></p></div>
    <div class="modal-section"><p class="modal-section-title">Contraindicaciones</p><p id="m-contraindicaciones"></p></div>
    <div class="modal-section"><p class="modal-section-title">Efectos secundarios</p><p id="m-efectos"></p></div>
    <button class="btn-add-modal" id="btn-add-modal" onclick="addFromModal()">Agregar al pedido</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');
let _productos=[],_filtrados=[],_categorias=[],_catActiva=null,_modalProd=null;

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(!session){window.location.href='/portal/login.html';return;}
  document.getElementById('nav-nombre').textContent=session.user.email;
  const {data:s}=await _db.from('suscriptores').select('nombre').eq('email',session.user.email).single();
  if(s){document.getElementById('nav-nombre').textContent=s.nombre;document.getElementById('nav-avatar').textContent=s.nombre[0].toUpperCase();}
  await loadCats();
  await loadProducts();
  updateCartBadge();
})();

async function loadCats(){
  const {data}=await _db.from('categorias').select('id,nombre').order('nombre');
  _categorias=data||[];
  const wrap=document.getElementById('cats-wrap');
  _categorias.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn';b.textContent=c.nombre;
    b.onclick=()=>selectCat(c.id,b);
    wrap.appendChild(b);
  });
}

async function loadProducts(){
  const {data}=await _db.from('productos').select('*,categorias(nombre)').eq('activo',true).order('nombre');
  _productos=data||[];
  _filtrados=[..._productos];
  renderGrid();
}

function selectCat(id,btn){
  _catActiva=id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterProducts();
}

function filterProducts(){
  const q=document.getElementById('search').value.toLowerCase();
  _filtrados=_productos.filter(p=>{
    const matchCat=_catActiva===null||(p.categoria_id===_catActiva);
    const matchQ=!q||p.nombre.toLowerCase().includes(q)||(p.principio_activo||'').toLowerCase().includes(q);
    return matchCat&&matchQ;
  });
  renderGrid();
}

function renderGrid(){
  const grid=document.getElementById('products-grid');
  if(!_filtrados.length){
    grid.innerHTML='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg><p>Catálogo en preparación</p></div>';
    return;
  }
  grid.innerHTML=_filtrados.map(p=>{
    const inCart=cartHas(p.id);
    return `<div class="prod-card">
      <p class="prod-nombre">${p.nombre}</p>
      <p class="prod-activo">${p.principio_activo||''}</p>
      <div class="prod-badges">
        ${p.requiere_receta?'<span class="badge-receta">Requiere receta</span>':''}
        ${p.categorias?.nombre?`<span class="badge-cat">${p.categorias.nombre}</span>`:''}
      </div>
      <div class="prod-precios">
        <p class="precio-normal">Farmacia: $${(p.precio_farmacia||0).toFixed(2)}</p>
        <p class="precio-sub">$${(p.precio_costo||0).toFixed(2)}</p>
      </div>
      <div class="prod-actions">
        <button class="btn-ver" onclick="openModal(${p.id})">Ver más</button>
        <button class="btn-add${inCart?' added':''}" id="add-${p.id}" onclick="addToCart(${p.id})">${inCart?'✓ Agregado':'Agregar al pedido'}</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id){
  const p=_productos.find(x=>x.id===id);if(!p)return;
  _modalProd=p;
  document.getElementById('m-nombre').textContent=p.nombre;
  document.getElementById('m-activo').textContent=p.principio_activo||'';
  document.getElementById('m-precio-sub').textContent=`$${(p.precio_costo||0).toFixed(2)}`;
  document.getElementById('m-precio-normal').textContent=`Precio farmacia: $${(p.precio_farmacia||0).toFixed(2)}`;
  const ahorro=((p.precio_farmacia||0)-(p.precio_costo||0));
  document.getElementById('m-ahorro').textContent=ahorro>0?`Ahorras $${ahorro.toFixed(2)}`:'';
  document.getElementById('m-indicaciones').textContent=p.indicaciones||'—';
  document.getElementById('m-dosis').textContent=p.dosis||'—';
  document.getElementById('m-contraindicaciones').textContent=p.contraindicaciones||'—';
  document.getElementById('m-efectos').textContent=p.efectos_secundarios||'—';
  const btn=document.getElementById('btn-add-modal');
  btn.textContent=cartHas(p.id)?'✓ Ya está en tu pedido':'Agregar al pedido';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modal-overlay').classList.remove('open');}

function addFromModal(){
  if(_modalProd)addToCart(_modalProd.id);
  document.getElementById('btn-add-modal').textContent='✓ Ya está en tu pedido';
}

function addToCart(id){
  const p=_productos.find(x=>x.id===id);if(!p)return;
  let cart=JSON.parse(localStorage.getItem('farmasub_cart')||'[]');
  if(!cart.find(i=>i.id===id)){
    cart.push({id:p.id,nombre:p.nombre,principio_activo:p.principio_activo,precio_costo:p.precio_costo,precio_farmacia:p.precio_farmacia,requiere_receta:p.requiere_receta,unidades_caja:p.unidades_caja||30,cantidad:1});
    localStorage.setItem('farmasub_cart',JSON.stringify(cart));
    showToast(`${p.nombre} agregado al pedido`);
  }
  updateCartBadge();
  const btn=document.getElementById('add-'+id);
  if(btn){btn.textContent='✓ Agregado';btn.classList.add('added');}
}

function cartHas(id){return JSON.parse(localStorage.getItem('farmasub_cart')||'[]').some(i=>i.id===id);}

function updateCartBadge(){
  const c=JSON.parse(localStorage.getItem('farmasub_cart')||'[]');
  const b=document.getElementById('cart-badge');
  if(c.length){b.style.display='flex';b.textContent=c.length;}else b.style.display='none';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function logout(){_db.auth.signOut().then(()=>window.location.href='/portal/login.html');}
</script>
</body>
</html>
