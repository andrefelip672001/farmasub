<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ingresar — MediCosto Ecuador</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root {
  --green:       #1A6B4A;
  --green-light: #EAF4EE;
  --green-menta: #ADEBB3;
  --green-mid:   #2E8A62;
  --gold:        #C8903A;
  --ink:         #12201A;
  --ink-60:      #5A7065;
  --ink-30:      #B0C4BB;
  --white:       #FFFFFF;
  --bg:          #F7FAF8;
  --danger:      #C84040;
  --danger-bg:   #FDF2F2;
  --r:           14px;
  --shadow-lg:   0 8px 40px rgba(26,107,74,.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0E3D29 0%, #1A6B4A 60%, #2E8A62 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  position: relative;
  overflow: hidden;
}

/* decorative blobs */
body::before {
  content: '';
  position: absolute; top: -30%; right: -15%;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(200,144,58,.15) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: absolute; bottom: -20%; left: -10%;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(94,232,160,.08) 0%, transparent 70%);
  pointer-events: none;
}

/* ── CARD ────────────────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 24px;
  padding: 48px 44px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-lg);
  position: relative;
  z-index: 1;
}

/* ── LOGO ────────────────────────────────────────────────── */
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 32px;
}
.logo-mark {
  width: 40px; height: 40px;
  background: var(--green);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 22px; height: 22px; }
.logo-text {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  color: var(--ink);
}
.logo-text span { color: var(--green); }

/* ── HEADING ─────────────────────────────────────────────── */
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.75rem;
  color: var(--ink);
  text-align: center;
  margin-bottom: 6px;
}
.card-sub {
  text-align: center;
  font-size: .9rem;
  color: var(--ink-60);
  margin-bottom: 32px;
}

/* ── ERROR BOX ───────────────────────────────────────────── */
.error-box {
  background: var(--danger-bg);
  border: 1px solid rgba(200,64,64,.25);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.error-box svg { flex-shrink: 0; }
.error-box p {
  font-size: .875rem;
  color: var(--danger);
  font-weight: 500;
  line-height: 1.4;
}

/* ── FORM ────────────────────────────────────────────────── */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: .85rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--ink-30);
  border-radius: var(--r);
  font-family: 'Inter', sans-serif;
  font-size: .95rem;
  color: var(--ink);
  background: var(--white);
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
.field input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(26,107,74,.1);
}
.field input.error {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(200,64,64,.1);
}
.field input::placeholder { color: var(--ink-30); }

/* password wrapper */
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 48px; }
.pass-toggle {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ink-60); padding: 4px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: color .2s;
}
.pass-toggle:hover { color: var(--green); }

/* forgot */
.forgot {
  text-align: right;
  margin-top: -10px;
  margin-bottom: 22px;
}
.forgot a {
  font-size: .82rem;
  color: var(--green);
  text-decoration: none;
  font-weight: 500;
}
.forgot a:hover { text-decoration: underline; }

/* submit button */
.btn-login {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: var(--white);
  border: none;
  border-radius: var(--r);
  font-family: 'Inter', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .15s, box-shadow .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-login:hover:not(:disabled) {
  background: var(--green-mid);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(26,107,74,.3);
}
.btn-login:disabled {
  opacity: .65;
  cursor: not-allowed;
}

/* spinner */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-login.loading .spinner { display: block; }
.btn-login.loading .btn-label { display: none; }

/* register link */
.register-link {
  text-align: center;
  margin-top: 24px;
  font-size: .875rem;
  color: var(--ink-60);
}
.register-link a {
  color: var(--green);
  font-weight: 600;
  text-decoration: none;
}
.register-link a:hover { text-decoration: underline; }

/* divider */
.divider {
  border: none;
  border-top: 1px solid #E8F0EC;
  margin: 28px 0 24px;
}

/* responsive */
@media (max-width: 480px) {
  .card { padding: 36px 24px; }
  .card-title { font-size: 1.5rem; }
}
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-text">Medi<span>Costo</span></span>
  </a>

  <h1 class="card-title">Ingresa a tu cuenta</h1>
  <p class="card-sub">Accede a tu suscripción MediCosto</p>

  <!-- Error box -->
  <div id="error-box" class="error-box" style="display:none">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="9" stroke="#C84040" stroke-width="1.5"/>
      <path d="M10 6v5M10 14h.01" stroke="#C84040" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p id="error-msg"></p>
  </div>

  <!-- Form -->
  <form id="login-form" onsubmit="handleLogin(event)" novalidate>

    <div class="field">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" required/>
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <div class="pass-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        <button type="button" class="pass-toggle" onclick="togglePass()" aria-label="Mostrar contraseña">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot">
      <a href="/portal/recuperar.html">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" id="btn-submit" class="btn-login">
      <span class="btn-label">Ingresar</span>
      <span class="spinner"></span>
    </button>

  </form>

  <hr class="divider"/>

  <p class="register-link">¿No tienes cuenta? <a href="/registro.html">Regístrate</a></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db = supabase.createClient(
  'https://cjimcldhoglgqachcimm.supabase.co',
  'sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC'
);

// ── Redirigir si ya hay sesión activa ────────────────────────
(async () => {
  const { data: { session } } = await _db.auth.getSession();
  if (session) redirectByRole(session.user);
})();

// ── Login ────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  clearError();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) {
    showError('Por favor completa todos los campos.');
    return;
  }

  setLoading(true);

  const { data, error } = await _db.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading(false);
    showError(translateError(error.message));
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
    return;
  }

  redirectByRole(data.user);
}

// ── Rol y redirección ────────────────────────────────────────
async function redirectByRole(user) {
  let rol = user.user_metadata?.rol ?? user.app_metadata?.rol ?? null;

  if (!rol) {
    const { data: perfil } = await _db
      .from('perfiles')
      .select('rol')
      .eq('id', user.id)
      .single();
    rol = perfil?.rol ?? 'suscriptor';
  }

  if (rol === 'admin') {
    window.location.href = '/admin/dashboard.html';
  } else {
    window.location.href = '/portal/dashboard.html';
  }
}

// ── Mostrar/ocultar contraseña ───────────────────────────────
function togglePass() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  icon.innerHTML = show
    ? `<path d="M3 3l14 14M8.5 8.6A3 3 0 0 0 11.4 11.5M6.1 6.2C4.2 7.5 2.7 9 2 10c1.7 2.8 4.6 5 8 5a9 9 0 0 0 3.9-.9M10 5c3.4 0 6.3 2.2 8 5a12 12 0 0 1-1.6 2.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`
    : `<path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>`;
}

// ── Helpers ──────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('btn-submit');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

function showError(msg) {
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-box').style.display = 'flex';
}

function clearError() {
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('email').classList.remove('error');
  document.getElementById('password').classList.remove('error');
}

function translateError(msg) {
  if (/invalid login credentials/i.test(msg))  return 'Correo o contraseña incorrectos.';
  if (/email not confirmed/i.test(msg))         return 'Por favor confirma tu correo electrónico antes de ingresar.';
  if (/too many requests/i.test(msg))           return 'Demasiados intentos. Espera unos minutos e intenta de nuevo.';
  if (/user not found/i.test(msg))              return 'No existe una cuenta con ese correo.';
  return 'Error al iniciar sesión. Intenta nuevamente.';
}
</script>
</body>
</html>
