<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mi cuenta — FarmaSub Ecuador</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1A6B4A;--green-light:#EAF4EE;--green-mid:#2E8A62;--gold:#C8903A;--ink:#12201A;--ink-60:#5A7065;--ink-30:#B0C4BB;--white:#FFFFFF;--bg:#F7FAF8;--danger:#C84040;--r:12px;--shadow:0 2px 12px rgba(26,107,74,.08);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.top-nav{height:64px;background:var(--white);border-bottom:1px solid rgba(26,107,74,.1);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;box-shadow:0 1px 8px rgba(26,107,74,.06);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-text{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--ink);}
.logo-text span{color:var(--green);}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-user{display:flex;align-items:center;gap:8px;font-size:.875rem;font-weight:500;color:var(--ink-60);}
.nav-avatar{width:32px;height:32px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:700;font-size:.82rem;}
.btn-logout{background:none;border:1.5px solid var(--ink-30);border-radius:8px;padding:6px 14px;font-size:.82rem;font-weight:500;color:var(--ink-60);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:240px;background:var(--green-light);border-right:1px solid rgba(26,107,74,.12);flex-shrink:0;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:2px;}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;text-decoration:none;font-size:.875rem;font-weight:500;color:var(--ink-60);transition:all .15s;}
.sb-link:hover{background:rgba(26,107,74,.1);color:var(--green);}
.sb-link.active{background:var(--green);color:var(--white);}
.sb-link svg{width:18px;height:18px;flex-shrink:0;stroke-width:1.8;}
.sb-badge{margin-left:auto;background:var(--gold);color:white;font-size:.7rem;font-weight:700;border-radius:99px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px;}
.sb-link.active .sb-badge{background:rgba(255,255,255,.3);}
.sb-divider{border:none;border-top:1px solid rgba(26,107,74,.15);margin:8px 0;}
.main{flex:1;overflow-y:auto;padding:28px;}
.page-title{font-family:'DM Serif Display',serif;font-size:1.7rem;margin-bottom:24px;}

/* SECTIONS */
.section-block{background:var(--white);border-radius:var(--r);padding:24px;box-shadow:var(--shadow);border:1px solid rgba(26,107,74,.06);margin-bottom:20px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.section-title{font-family:'DM Serif Display',serif;font-size:1.1rem;}
.btn-edit{background:none;border:1.5px solid var(--green);border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:600;color:var(--green);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-edit:hover{background:var(--green-light);}
.btn-save{background:var(--green);border:none;border-radius:8px;padding:6px 14px;font-size:.8rem;font-weight:600;color:white;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:none;}
.btn-save:hover{background:var(--green-mid);}

/* PROFILE FIELDS */
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-label{font-size:.72rem;font-weight:700;color:var(--ink-60);text-transform:uppercase;letter-spacing:.06em;}
.field-value{font-size:.9rem;color:var(--ink);padding:8px 12px;background:var(--bg);border-radius:8px;}
.field-input{font-size:.9rem;color:var(--ink);padding:8px 12px;background:var(--white);border:1.5px solid var(--ink-30);border-radius:8px;font-family:'Inter',sans-serif;outline:none;transition:border .2s;display:none;width:100%;}
.field-input:focus{border-color:var(--green);}

/* MEMBERS */
.member-card{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg);border-radius:10px;margin-bottom:8px;}
.member-info{display:flex;align-items:center;gap:12px;}
.member-avatar{width:36px;height:36px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--green);font-weight:700;font-size:.85rem;}
.member-nombre{font-weight:600;font-size:.875rem;}
.member-rel{font-size:.8rem;color:var(--ink-60);}
.btn-salud{padding:5px 12px;background:none;border:1.5px solid var(--green);border-radius:8px;font-size:.75rem;font-weight:600;color:var(--green);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-salud:hover{background:var(--green-light);}

/* PAYMENTS */
.pay-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--green-light);}
.pay-row:last-child{border:none;}
.pay-mes{font-size:.875rem;font-weight:500;}
.pay-monto{font-size:.875rem;font-weight:600;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
.badge-pagado{background:#DCFCE7;color:#166534;}
.badge-pendiente{background:#FEF9C3;color:#854D0E;}
.badge-vencido{background:#FEE2E2;color:#991B1B;}

/* CHANGE PASSWORD */
.pass-grid{display:flex;flex-direction:column;gap:12px;max-width:380px;}
.pass-field{display:flex;flex-direction:column;gap:5px;}
.pass-label{font-size:.8rem;font-weight:600;color:var(--ink-60);}
.pass-input{padding:10px 12px;border:1.5px solid var(--ink-30);border-radius:8px;font-family:'Inter',sans-serif;font-size:.875rem;color:var(--ink);outline:none;transition:border .2s;}
.pass-input:focus{border-color:var(--green);}
.btn-cambiar{padding:10px 20px;background:var(--green);border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:600;color:white;cursor:pointer;transition:all .2s;align-self:flex-start;}
.btn-cambiar:hover{background:var(--green-mid);}
.pass-msg{font-size:.82rem;padding:8px 12px;border-radius:8px;display:none;}
.pass-ok{background:#DCFCE7;color:#166534;}
.pass-err{background:#FEE2E2;color:#991B1B;}
</style>
</head>
<body>
<div class="app">

<nav class="top-nav">
  <a href="/portal/dashboard.html" class="nav-logo">
    <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M7 10h6M10 7v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="logo-text">Farma<span>Sub</span></span>
  </a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span id="nav-nombre">Cargando...</span>
    </div>
    <button onclick="logout()" class="btn-logout">Cerrar sesión</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/portal/dashboard.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12L12 3l9 9"/><path d="M5 10v10h5v-5h4v5h5V10"/></svg>Inicio</a>
    <a href="/portal/catalogo.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>Catálogo</a>
    <a href="/portal/pedido.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Mi pedido
      <span class="sb-badge" id="cart-badge" style="display:none">0</span>
    </a>
    <a href="/portal/mis-pedidos.html" class="sb-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mis pedidos</a>
    <hr class="sb-divider"/>
    <a href="/portal/cuenta.html" class="sb-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Mi cuenta</a>
  </aside>

  <main class="main">
    <h1 class="page-title">Mi cuenta</h1>

    <!-- DATOS DEL TITULAR -->
    <div class="section-block">
      <div class="section-header">
        <h2 class="section-title">Datos del titular</h2>
        <div style="display:flex;gap:8px">
          <button class="btn-edit" id="btn-edit" onclick="toggleEdit()">Editar</button>
          <button class="btn-save" id="btn-save" onclick="saveProfile()">Guardar</button>
        </div>
      </div>
      <div class="fields-grid" id="fields-grid">
        <div style="text-align:center;grid-column:1/-1;padding:20px;color:var(--ink-60)">Cargando...</div>
      </div>
    </div>

    <!-- MIEMBROS -->
    <div class="section-block">
      <div class="section-header">
        <h2 class="section-title">Grupo familiar</h2>
      </div>
      <div id="members-list"><div style="color:var(--ink-60);font-size:.875rem">Cargando...</div></div>
    </div>

    <!-- PAGOS -->
    <div class="section-block">
      <div class="section-header">
        <h2 class="section-title">Historial de pagos</h2>
      </div>
      <div id="pagos-list"><div style="color:var(--ink-60);font-size:.875rem">Cargando...</div></div>
    </div>

    <!-- CAMBIAR CONTRASEÑA -->
    <div class="section-block">
      <div class="section-header">
        <h2 class="section-title">Cambiar contraseña</h2>
      </div>
      <div class="pass-grid">
        <div class="pass-field">
          <label class="pass-label">Nueva contraseña</label>
          <input class="pass-input" type="password" id="new-pass" placeholder="Mínimo 6 caracteres"/>
        </div>
        <div class="pass-field">
          <label class="pass-label">Confirmar contraseña</label>
          <input class="pass-input" type="password" id="confirm-pass" placeholder="Repite la contraseña"/>
        </div>
        <p class="pass-msg" id="pass-msg"></p>
        <button class="btn-cambiar" onclick="changePass()">Cambiar contraseña</button>
      </div>
    </div>
  </main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const _db=supabase.createClient('https://cjimcldhoglgqachcimm.supabase.co','sb_publishable_ltkndWUiaaiQaszDKnU3sA_Hl0Ty7kC');
let _user,_susc,_editMode=false;
const FIELDS=[{k:'nombre',l:'Nombre completo'},{k:'cedula',l:'Cédula'},{k:'email',l:'Correo electrónico'},{k:'telefono',l:'Teléfono'},{k:'direccion',l:'Dirección'},{k:'barrio',l:'Barrio/Sector'}];

(async()=>{
  const {data:{session}}=await _db.auth.getSession();
  if(!session){window.location.href='/portal/login.html';return;}
  _user=session.user;
  const {data:s}=await _db.from('suscriptores').select('*').eq('email',_user.email).single();
  _susc=s;
  document.getElementById('nav-nombre').textContent=s?.nombre||_user.email;
  document.getElementById('nav-avatar').textContent=(s?.nombre||_user.email)[0].toUpperCase();
  renderFields();
  await loadMembers();
  await loadPagos();
  updateCartBadge();
})();

function renderFields(){
  document.getElementById('fields-grid').innerHTML=FIELDS.map(f=>`
    <div class="field-group">
      <span class="field-label">${f.l}</span>
      <span class="field-value" id="fv-${f.k}">${_susc?.[f.k]||'—'}</span>
      <input class="field-input" id="fi-${f.k}" type="text" value="${_susc?.[f.k]||''}"/>
    </div>`).join('');
}

function toggleEdit(){
  _editMode=!_editMode;
  FIELDS.forEach(f=>{
    document.getElementById('fv-'+f.k).style.display=_editMode?'none':'block';
    document.getElementById('fi-'+f.k).style.display=_editMode?'block':'none';
  });
  document.getElementById('btn-edit').style.display=_editMode?'none':'block';
  document.getElementById('btn-save').style.display=_editMode?'block':'none';
}

async function saveProfile(){
  const updates={};
  FIELDS.forEach(f=>{updates[f.k]=document.getElementById('fi-'+f.k).value.trim();});
  const {error}=await _db.from('suscriptores').update(updates).eq('cedula',_susc.cedula);
  if(!error){Object.assign(_susc,updates);renderFields();toggleEdit();}
  else alert('Error al guardar. Intenta nuevamente.');
}

async function loadMembers(){
  const {data:m}=await _db.from('miembros').select('*').eq('suscriptor_cedula',_susc?.cedula);
  const list=document.getElementById('members-list');
  if(!m||!m.length){list.innerHTML='<p style="color:var(--ink-60);font-size:.875rem">No tienes miembros adicionales registrados.</p>';return;}
  list.innerHTML=m.map(mb=>`<div class="member-card">
    <div class="member-info">
      <div class="member-avatar">${mb.nombre[0]}</div>
      <div><p class="member-nombre">${mb.nombre}</p><p class="member-rel">${mb.relacion||'Familiar'} · C.I. ${mb.cedula}</p></div>
    </div>
    <button class="btn-salud" onclick="verSalud('${mb.cedula}','${mb.nombre}')">Ver cuestionario</button>
  </div>`).join('');
}

async function loadPagos(){
  const {data:pagos}=await _db.from('pagos').select('*').eq('suscriptor_cedula',_susc?.cedula).order('created_at',{ascending:false});
  const list=document.getElementById('pagos-list');
  if(!pagos||!pagos.length){list.innerHTML='<p style="color:var(--ink-60);font-size:.875rem">Sin historial de pagos aún.</p>';return;}
  list.innerHTML=pagos.map(p=>{
    const cls={pagado:'badge-pagado',pendiente:'badge-pendiente',vencido:'badge-vencido'}[p.estado]||'badge-pendiente';
    return `<div class="pay-row"><span class="pay-mes">${p.mes||new Date(p.created_at).toLocaleDateString('es-EC',{month:'long',year:'numeric'})}</span><div style="display:flex;align-items:center;gap:12px"><span class="pay-monto">$${(p.monto||8).toFixed(2)}</span><span class="badge ${cls}">${p.estado}</span></div></div>`;
  }).join('');
}

async function verSalud(cedula,nombre){
  const {data:s}=await _db.from('salud').select('*').eq('persona_cedula',cedula).single();
  if(!s){alert(`No hay cuestionario de salud registrado para ${nombre}.`);return;}
  const conds=Array.isArray(s.condiciones)?s.condiciones.join(', '):s.condiciones||'—';
  alert(`Cuestionario de salud — ${nombre}\n\nCondiciones: ${conds}\nMedicamentos: ${s.no_toma_medicamentos?'No toma':'Sí toma'}\nTiempo de tratamiento: ${s.tiempo_tratamiento||'—'}\nAlergias: ${s.alergico==='si'?s.alergia_detalle||'Sí':'No'}`);
}

async function changePass(){
  const np=document.getElementById('new-pass').value;
  const cp=document.getElementById('confirm-pass').value;
  const msg=document.getElementById('pass-msg');
  msg.style.display='block';
  msg.className='pass-msg';
  if(np.length<6){msg.classList.add('pass-err');msg.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
  if(np!==cp){msg.classList.add('pass-err');msg.textContent='Las contraseñas no coinciden.';return;}
  const {error}=await _db.auth.updateUser({password:np});
  if(error){msg.classList.add('pass-err');msg.textContent='Error al cambiar contraseña. Intenta nuevamente.';}
  else{msg.classList.add('pass-ok');msg.textContent='Contraseña actualizada con éxito.';document.getElementById('new-pass').value='';document.getElementById('confirm-pass').value='';}
}

function updateCartBadge(){const c=JSON.parse(localStorage.getItem('farmasub_cart')||'[]');const b=document.getElementById('cart-badge');if(c.length){b.style.display='flex';b.textContent=c.length;}else b.style.display='none';}
function logout(){_db.auth.signOut().then(()=>window.location.href='/portal/login.html');}
</script>
</body>
</html>
